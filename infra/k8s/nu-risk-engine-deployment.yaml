apiVersion: apps/v1
kind: Deployment
metadata:
  name: nu-risk-engine
  namespace: default
  labels:
    app: nu-risk-engine
    app.kubernetes.io/name: nu-risk-engine
    app.kubernetes.io/part-of: nu-core
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nu-risk-engine
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: nu-risk-engine
        app.kubernetes.io/name: nu-risk-engine
        app.kubernetes.io/part-of: nu-core
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nu-risk-engine
          image: nu-risk-engine:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          envFrom:
            - configMapRef:
                name: nu-app-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      terminationGracePeriodSeconds: 30
