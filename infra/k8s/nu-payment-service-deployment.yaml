apiVersion: apps/v1
kind: Deployment
metadata:
  name: nu-payment-service
  namespace: nucore-lab
  labels:
    app: nu-payment-service
    app.kubernetes.io/name: nu-payment-service
    app.kubernetes.io/part-of: nu-core
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nu-payment-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: nu-payment-service
        app.kubernetes.io/name: nu-payment-service
        app.kubernetes.io/part-of: nu-core
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      # Ensures DynamoDB tables exist in LocalStack before the app starts (idempotent).
      initContainers:
        - name: create-dynamodb-tables
          image: amazon/aws-cli:2.21.0
          envFrom:
            - configMapRef:
                name: nu-app-config
          env:
            - name: AWS_ACCESS_KEY_ID
              value: "test"
            - name: AWS_SECRET_ACCESS_KEY
              value: "test"
            - name: AWS_DEFAULT_REGION
              value: "us-east-1"
            # Init uses HTTP to reach LocalStack (same as main container)
            - name: AWS_DYNAMODB_ENDPOINT
              value: "http://localstack:4566"
          command:
            - /bin/sh
            - -c
            - |
              ENDPOINT="${AWS_DYNAMODB_ENDPOINT:-http://localstack:4566}"
              SSL_OPT=""
              [ "${ENDPOINT#https://}" != "$ENDPOINT" ] && SSL_OPT="--no-verify-ssl"
              echo "Waiting for LocalStack at $ENDPOINT (DynamoDB can take 60-90s to init)..."
              for i in $(seq 1 30); do
                if aws dynamodb list-tables --endpoint-url "$ENDPOINT" $SSL_OPT 2>/dev/null; then break; fi
                echo "Attempt $i/30 - retrying in 3s..."; sleep 3
              done
              echo "Creating table nu-core-payment-accounts..."
              aws dynamodb create-table --endpoint-url "$ENDPOINT" $SSL_OPT --region us-east-1 \
                --table-name nu-core-payment-accounts \
                --attribute-definitions AttributeName=id,AttributeType=S \
                --key-schema AttributeName=id,KeyType=HASH --billing-mode PAY_PER_REQUEST || true
              echo "Creating table nu-core-payment-transactions..."
              aws dynamodb create-table --endpoint-url "$ENDPOINT" $SSL_OPT --region us-east-1 \
                --table-name nu-core-payment-transactions \
                --attribute-definitions AttributeName=id,AttributeType=S \
                --key-schema AttributeName=id,KeyType=HASH --billing-mode PAY_PER_REQUEST || true
              echo "DynamoDB tables ready."
      # For production: build image with USER not root and uncomment runAsNonRoot/runAsUser
      # securityContext.runAsNonRoot: true; runAsUser: 1000
      containers:
        - name: nu-payment-service
          image: nu-payment-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: nu-app-config
          env:
            # Force HTTP; LocalStack in K8s runs with USE_SSL=0
            - name: AWS_DYNAMODB_ENDPOINT
              value: "http://localstack:4566"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      terminationGracePeriodSeconds: 30
