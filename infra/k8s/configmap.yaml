# ConfigMap: environment variables for Kafka (in-cluster) and LocalStack.
# Adjust the values according to your Kafka and LocalStack deployment in the cluster.
apiVersion: v1
kind: ConfigMap
metadata:
  name: nu-app-config
  namespace: nucore-lab
  labels:
    app.kubernetes.io/part-of: nu-core
data:
  # Profile to load application-kubernetes.yml (LocalStack and Kafka in the cluster)
  SPRING_PROFILES_ACTIVE: "kubernetes"
  # Kafka (service from k8s-infrastructure.yaml: kafka:9092 in nucore-lab namespace)
  SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka.nucore-lab.svc.cluster.local:9092"
  # LocalStack / DynamoDB — Service port 4566 (maps to container 33773; see k8s-infrastructure.yaml)
  # Same namespace: use "localstack" or "localstack.nucore-lab.svc.cluster.local"
  AWS_DYNAMODB_ENDPOINT: "http://localstack:4566"
  AWS_REGION: "us-east-1"
  # Credentials DynamoDB/LocalStack (in production use Secret and AWS real)
  AWS_DYNAMODB_ACCESS_KEY_ID: "test"
  AWS_DYNAMODB_SECRET_ACCESS_KEY: "test"
  # Spring Boot: enable liveness/readiness for Kubernetes probes (nu-payment-service & nu-risk-engine)
  MANAGEMENT_HEALTH_LIVENESSSTATE_ENABLED: "true"
  MANAGEMENT_HEALTH_READINESSSTATE_ENABLED: "true"
