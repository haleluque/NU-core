# Service NodePort for external access from the host.
apiVersion: v1
kind: Service
metadata:
  name: nu-risk-engine
  namespace: nucore-lab
  labels:
    app: nu-risk-engine
    app.kubernetes.io/name: nu-risk-engine
    app.kubernetes.io/part-of: nu-core
spec:
  type: NodePort
  selector:
    app: nu-risk-engine
  ports:
    - name: http
      port: 8081
      targetPort: http
      protocol: TCP
      nodePort: 30081
  sessionAffinity: None
