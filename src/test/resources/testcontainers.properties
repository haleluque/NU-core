# Testcontainers Docker host (classpath override).
# Windows + Docker Desktop WSL2: npipe often returns 400. Prefer exposing daemon on TCP:
# Docker Desktop > Settings > General > "Expose daemon on tcp://localhost:2375 without TLS"
# Then set DOCKER_HOST=tcp://localhost:2375 (or leave unset if using Surefire env in pom.xml).
docker.host=tcp://localhost:2375
