server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: when-authorized
    prometheus:
      access: unrestricted

spring:
  application:
    name: nu.core
  kafka:
    # Port 29092 = EXTERNAL listener (host). Containers use kafka:9092
    bootstrap-servers: localhost:29092
    consumer:
      group-id: nu-core-payment
      auto-offset-reset: latest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

# Payment module: Kafka topics and metric names
app:
  payment:
    kafka:
      topic-payment-events: payment-events
      topic-risk-events: risk-events
      topic-payment-completed: payment.completed
    metrics:
      payments-processed-total: payments.processed.total
      payments-compensated-total: payments.compensated.total

# LocalStack (DynamoDB): use empty endpoint in production (real AWS)
aws:
  region: us-east-1
  dynamodb:
    endpoint: http://localhost:4566
    access-key-id: test
    secret-access-key: test
