# Configuration for execution within the Kubernetes cluster (nucore-lab).
# Activated with spring.profiles.active=kubernetes (defined in the ConfigMap of the deployment).
# Includes the same properties as application.yml; only Kafka and DynamoDB (services in the cluster) change.
server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: when-authorized
    prometheus:
      access: unrestricted

spring:
  application:
    name: nu.core
  kafka:
    bootstrap-servers: kafka.nucore-lab.svc.cluster.local:9092
    consumer:
      group-id: nu-core-payment
      auto-offset-reset: latest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

# Payment module: Kafka topics and metric names
app:
  payment:
    kafka:
      topic-payment-events: payment-events
      topic-risk-events: risk-events
      topic-payment-completed: payment.completed
    metrics:
      payments-processed-total: payments.processed.total
      payments-compensated-total: payments.compensated.total

# LocalStack (DynamoDB) in the cluster: service localstack:4566 (HTTP; USE_SSL=0 in k8s-infrastructure)
aws:
  region: us-east-1
  dynamodb:
    endpoint: http://localstack:4566
    access-key-id: test
    secret-access-key: test
